<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprint Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 30px;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .dashboard-header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .dashboard-header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.9);
            color: #333;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
            background: rgba(255,255,255,1);
        }

        .color-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .color-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid rgba(255,255,255,0.5);
            transition: all 0.3s ease;
        }

        .color-option:hover, .color-option.active {
            border-color: white;
            transform: scale(1.1);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .column {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 20px;
            min-height: 400px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .column-header {
            text-align: center;
            margin-bottom: 20px;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .todo-header { background: linear-gradient(45deg, #ff9a9e, #fecfef); }
        .progress-header { background: linear-gradient(45deg, #a8edea, #fed6e3); }
        .review-header { background: linear-gradient(45deg, #ffecd2, #fcb69f); }
        .done-header { background: linear-gradient(45deg, #a8e6cf, #dcedc1); }

        .notes-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sticky-note {
            background: #ffd54f;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            cursor: move;
            transition: all 0.3s ease;
            position: relative;
            min-height: 80px;
            word-wrap: break-word;
        }

        .sticky-note:hover {
            transform: translateY(-5px) rotate(1deg);
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
        }

        .sticky-note.dragging {
            opacity: 0.7;
            transform: rotate(5deg);
            z-index: 1000;
        }

        .note-content {
            font-size: 14px;
            line-height: 1.4;
            margin-bottom: 10px;
        }

        .note-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .sticky-note:hover .note-controls {
            opacity: 1;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 50%;
            width: 25px;
            height: 25px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: #ff3742;
            transform: scale(1.1);
        }

        .note-timestamp {
            font-size: 10px;
            opacity: 0.7;
        }

        .drop-zone {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 20px;
            margin: 10px 0;
            text-align: center;
            color: #666;
            transition: all 0.3s ease;
            opacity: 0;
        }

        .drop-zone.active {
            opacity: 1;
            border-color: #4CAF50;
            background: rgba(76, 175, 80, 0.1);
            color: #4CAF50;
        }

        .add-note-area {
            background: rgba(255,255,255,0.5);
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .add-note-area:hover {
            background: rgba(255,255,255,0.8);
            border-color: #999;
        }

        /* Color classes */
        .yellow { background: linear-gradient(135deg, #ffd54f, #ffecb3); }
        .pink { background: linear-gradient(135deg, #f8bbd9, #f48fb1); }
        .blue { background: linear-gradient(135deg, #81d4fa, #b3e5fc); }
        .green { background: linear-gradient(135deg, #a5d6a7, #c8e6c9); }
        .orange { background: linear-gradient(135deg, #ffab91, #ffccbc); }
        .purple { background: linear-gradient(135deg, #ce93d8, #e1bee7); }
        .red { background: linear-gradient(135deg, #ef9a9a, #ffcdd2); }
        .cyan { background: linear-gradient(135deg, #80deea, #b2ebf2); }

        .modal {
            display: none;
            position: fixed;
            z-index: 2000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.5em;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #555;
        }

        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            min-height: 100px;
        }

        .form-group textarea:focus {
            border-color: #667eea;
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-primary {
            background: linear-gradient(45deg, #667eea, #764ba2);
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        @keyframes noteAdd {
            from {
                opacity: 0;
                transform: scale(0.8) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .note-added {
            animation: noteAdd 0.5s ease-out;
        }

        @media (max-width: 768px) {
            .board {
                grid-template-columns: 1fr;
            }
            
            .controls {
                flex-direction: column;
                align-items: center;
            }
            
            .color-selector {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="dashboard-header">
        <h1>🚀 Sprint Dashboard</h1>
        <p>Organize your tasks with colorful sticky notes</p>
    </div>

    <div class="controls">
        <button class="btn" onclick="clearAllNotes()">Clear All</button>
        <button class="btn" onclick="exportData()">Export Data</button>
        <div class="color-selector">
            <span style="color: white; font-weight: bold; margin-right: 10px;">Note Color:</span>
            <div class="color-option yellow active" onclick="selectColor('yellow')" style="background: linear-gradient(135deg, #ffd54f, #ffecb3);"></div>
            <div class="color-option pink" onclick="selectColor('pink')" style="background: linear-gradient(135deg, #f8bbd9, #f48fb1);"></div>
            <div class="color-option blue" onclick="selectColor('blue')" style="background: linear-gradient(135deg, #81d4fa, #b3e5fc);"></div>
            <div class="color-option green" onclick="selectColor('green')" style="background: linear-gradient(135deg, #a5d6a7, #c8e6c9);"></div>
            <div class="color-option orange" onclick="selectColor('orange')" style="background: linear-gradient(135deg, #ffab91, #ffccbc);"></div>
            <div class="color-option purple" onclick="selectColor('purple')" style="background: linear-gradient(135deg, #ce93d8, #e1bee7);"></div>
            <div class="color-option red" onclick="selectColor('red')" style="background: linear-gradient(135deg, #ef9a9a, #ffcdd2);"></div>
            <div class="color-option cyan" onclick="selectColor('cyan')" style="background: linear-gradient(135deg, #80deea, #b2ebf2);"></div>
        </div>
    </div>

    <div class="board">
        <div class="column" data-column="todo">
            <div class="column-header todo-header">📋 To Do</div>
            <div class="notes-container" id="todo-notes"></div>
            <div class="drop-zone" id="todo-drop">Drop notes here</div>
            <div class="add-note-area" onclick="showAddNoteModal('todo')">
                + Add New Task
            </div>
        </div>

        <div class="column" data-column="progress">
            <div class="column-header progress-header">⚡ In Progress</div>
            <div class="notes-container" id="progress-notes"></div>
            <div class="drop-zone" id="progress-drop">Drop notes here</div>
            <div class="add-note-area" onclick="showAddNoteModal('progress')">
                + Add New Task
            </div>
        </div>

        <div class="column" data-column="review">
            <div class="column-header review-header">👀 Review</div>
            <div class="notes-container" id="review-notes"></div>
            <div class="drop-zone" id="review-drop">Drop notes here</div>
            <div class="add-note-area" onclick="showAddNoteModal('review')">
                + Add New Task
            </div>
        </div>

        <div class="column" data-column="done">
            <div class="column-header done-header">✅ Done</div>
            <div class="notes-container" id="done-notes"></div>
            <div class="drop-zone" id="done-drop">Drop notes here</div>
            <div class="add-note-area" onclick="showAddNoteModal('done')">
                + Add New Task
            </div>
        </div>
    </div>

    <!-- Modal for adding notes -->
    <div id="noteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Add New Task</div>
            <div class="form-group">
                <label for="noteText">Task Description:</label>
                <textarea id="noteText" placeholder="Enter your task description..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-secondary" onclick="hideAddNoteModal()">Cancel</button>
                <button class="btn btn-primary" onclick="addNote()">Add Task</button>
            </div>
        </div>
    </div>

    <script>
        let selectedColor = 'yellow';
        let currentColumn = 'todo';
        let draggedElement = null;
        let notes = JSON.parse(localStorage.getItem('sprintNotes')) || {};

        // Initialize the dashboard
        function init() {
            loadNotes();
            setupEventListeners();
        }

        function setupEventListeners() {
            // Modal click outside to close
            document.getElementById('noteModal').addEventListener('click', function(e) {
                if (e.target === this) {
                    hideAddNoteModal();
                }
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    hideAddNoteModal();
                }
                if (e.key === 'Enter' && e.ctrlKey) {
                    addNote();
                }
            });

            // Setup drag and drop for columns
            document.querySelectorAll('.column').forEach(column => {
                column.addEventListener('dragover', handleDragOver);
                column.addEventListener('drop', handleDrop);
                column.addEventListener('dragenter', handleDragEnter);
                column.addEventListener('dragleave', handleDragLeave);
            });
        }

        function selectColor(color) {
            selectedColor = color;
            document.querySelectorAll('.color-option').forEach(option => {
                option.classList.remove('active');
            });
            document.querySelector(`.color-option.${color}`).classList.add('active');
        }

        function showAddNoteModal(column) {
            currentColumn = column;
            document.getElementById('noteText').value = '';
            document.getElementById('noteModal').style.display = 'block';
            setTimeout(() => {
                document.getElementById('noteText').focus();
            }, 100);
        }

        function hideAddNoteModal() {
            document.getElementById('noteModal').style.display = 'none';
        }

        function addNote() {
            const text = document.getElementById('noteText').value.trim();
            if (!text) return;

            const note = {
                id: Date.now(),
                text: text,
                color: selectedColor,
                timestamp: new Date().toLocaleString()
            };

            if (!notes[currentColumn]) {
                notes[currentColumn] = [];
            }
            notes[currentColumn].push(note);
            
            saveNotes();
            renderNote(note, currentColumn);
            hideAddNoteModal();
        }

        function renderNote(note, column) {
            const container = document.getElementById(`${column}-notes`);
            const noteElement = document.createElement('div');
            noteElement.className = `sticky-note ${note.color} note-added`;
            noteElement.draggable = true;
            noteElement.dataset.noteId = note.id;
            noteElement.dataset.column = column;

            noteElement.innerHTML = `
                <div class="note-content">${note.text}</div>
                <div class="note-controls">
                    <span class="note-timestamp">${note.timestamp}</span>
                    <button class="delete-btn" onclick="deleteNote(${note.id}, '${column}')" title="Delete note">×</button>
                </div>
            `;

            // Add drag event listeners
            noteElement.addEventListener('dragstart', handleDragStart);
            noteElement.addEventListener('dragend', handleDragEnd);

            container.appendChild(noteElement);
        }

        function deleteNote(noteId, column) {
            if (confirm('Are you sure you want to delete this note?')) {
                notes[column] = notes[column].filter(note => note.id !== noteId);
                saveNotes();
                
                const noteElement = document.querySelector(`[data-note-id="${noteId}"]`);
                noteElement.style.animation = 'noteAdd 0.3s ease-in reverse';
                setTimeout(() => {
                    noteElement.remove();
                }, 300);
            }
        }

        function handleDragStart(e) {
            draggedElement = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd(e) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.classList.remove('active');
            });
        }

        function handleDragOver(e) {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
        }

        function handleDragEnter(e) {
            e.preventDefault();
            const dropZone = e.currentTarget.querySelector('.drop-zone');
            if (dropZone) {
                dropZone.classList.add('active');
            }
        }

        function handleDragLeave(e) {
            if (!e.currentTarget.contains(e.relatedTarget)) {
                const dropZone = e.currentTarget.querySelector('.drop-zone');
                if (dropZone) {
                    dropZone.classList.remove('active');
                }
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const targetColumn = e.currentTarget.dataset.column;
            const noteId = parseInt(draggedElement.dataset.noteId);
            const sourceColumn = draggedElement.dataset.column;

            if (targetColumn !== sourceColumn) {
                // Move note between columns
                const noteIndex = notes[sourceColumn].findIndex(note => note.id === noteId);
                const note = notes[sourceColumn][noteIndex];
                
                notes[sourceColumn].splice(noteIndex, 1);
                if (!notes[targetColumn]) {
                    notes[targetColumn] = [];
                }
                notes[targetColumn].push(note);

                saveNotes();
                
                // Move DOM element
                const targetContainer = document.getElementById(`${targetColumn}-notes`);
                draggedElement.dataset.column = targetColumn;
                targetContainer.appendChild(draggedElement);
            }

            document.querySelectorAll('.drop-zone').forEach(zone => {
                zone.classList.remove('active');
            });
        }

        function loadNotes() {
            Object.keys(notes).forEach(column => {
                notes[column].forEach(note => {
                    renderNote(note, column);
                });
            });
        }

        function saveNotes() {
            localStorage.setItem('sprintNotes', JSON.stringify(notes));
        }

        function clearAllNotes() {
            if (confirm('Are you sure you want to clear all notes? This action cannot be undone.')) {
                notes = {};
                saveNotes();
                document.querySelectorAll('.notes-container').forEach(container => {
                    container.innerHTML = '';
                });
            }
        }

        function exportData() {
            const dataStr = JSON.stringify(notes, null, 2);
            const dataBlob = new Blob([dataStr], {type: 'application/json'});
            const url = URL.createObjectURL(dataBlob);
            const link = document.createElement('a');
            link.href = url;
            link.download = `sprint-dashboard-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        // Initialize the app
        init();

        // Add some sample data if no notes exist
        if (Object.keys(notes).length === 0) {
            const sampleNotes = {
                todo: [
                    { id: 1, text: "Design user interface mockups", color: "blue", timestamp: new Date().toLocaleString() },
                    { id: 2, text: "Set up project repository", color: "yellow", timestamp: new Date().toLocaleString() }
                ],
                progress: [
                    { id: 3, text: "Implement authentication system", color: "orange", timestamp: new Date().toLocaleString() }
                ],
                review: [
                    { id: 4, text: "Code review for API endpoints", color: "purple", timestamp: new Date().toLocaleString() }
                ],
                done: [
                    { id: 5, text: "Set up development environment", color: "green", timestamp: new Date().toLocaleString() }
                ]
            };
            
            notes = sampleNotes;
            saveNotes();
            
            // Clear existing and load sample data
            document.querySelectorAll('.notes-container').forEach(container => {
                container.innerHTML = '';
            });
            loadNotes();
        }
    </script>
</body>
</html>
